services:
  - type: web
    name: montania
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: STRAVA_CLIENT_ID
        sync: false
      - key: STRAVA_CLIENT_SECRET
        sync: false
      - key: STRAVA_VERIFY_TOKEN
        value: montania_webhook_2024
      - key: APP_BASE_URL
        sync: false
      - key: DATABASE_URL
        value: sqlite:///montania.db
